<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
}

.container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  animation: fadeIn 1s ease;
}

.checkmark {
  font-size: 60px;
  color: #00ffcc;
  margin-bottom: 15px;
  animation: pop 0.5s ease;
}

h1 {
  margin: 10px 0;
}

p {
  opacity: 0.8;
  margin-bottom: 25px;
}

.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #0072ff;
  transform: scale(1.05);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
  <div class="checkmark">✔</div>
  <h1>Thank You!</h1>
  <p>Your message has been successfully sent.<br>We will contact you soon 😊</p>

  <button class="btn" onclick="goHome()">Go to Home</button>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
