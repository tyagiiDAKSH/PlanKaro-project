<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>PlanKaro Admin Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        *{
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            overflow-x: hidden;
        }

        .dashboard {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            
        }

        .sidebar h2 {
            margin-bottom: 20px;
        }

        .sidebar li {
            list-style: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Sections */
        .section {
            display: none;
            margin-top: 20px;
        }

        /* Input + Button */
        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
        }

        /* List */
        ul {
            padding: 0;
        }

        li.item {
            background: rgba(255, 255, 255, 0.08);
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        /* #eventList li {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            color: white;
        } */
        /* #eventList button {
  padding: 6px 12px;     
  border-radius: 6px;
  border: none;
  cursor: pointer;
  margin-right: 5px;
}
button[onclick^="approveEvent"] {
  background: #00c853;
  color: white;
}

button[onclick^="deleteEvent"] {
  background: #ff5252;
  color: white;
}  */

        .event-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            /* 👈 center vertically */
        }

        .event-actions button {
            padding: 5px 10px;
            /* 👈 size chhota */
            font-size: 11px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            height: auto;
            /* 👈 important */
        }

        /* Approve */
        button[onclick^="approveEvent"] {
            background: #00c853;
            color: white;
        }

        /* Delete */
        button[onclick^="deleteEvent"] {
            background: #ff5252;
            color: white;
        }

        #eventList li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* 👈 ye hi fix karega stretch issue */
        }

        /* Animation */
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #userList {
  list-style: none;
  padding: 0;
}

.user-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.user-card:hover {
  transform: scale(1.02);
}

.user-info h3 {
  margin: 0;
  color: white;
}

.user-info p {
  margin: 5px 0 0;
  color: #94a3b8;
}

.user-card button {
  background: #22c55e;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

.user-card button:hover {
  background: #16a34a;
}

@media (max-width: 768px) {

  .dashboard {
    flex-direction: column;
    display: block;
    width: 100%;
  }

  body{
    overflow-x: hidden;
  }
  .sidebar {
    width: 100%;
    height: auto;
    display: flex;
    justify-content: space-around;
    align-items: center;

    position: fixed;
    top: 0;        /* 👈 bottom hata ke top */
    left: 0;
    z-index: 1000;

    padding: 10px 0;
  }

  .sidebar h2 {
    display: none;
    backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar li {
    font-size: 14px;
  }

  .main {
    margin: 0;
    width: 100%;
    margin-top: 60px;   /* 👈 IMPORTANT (navbar ke niche space) */
    padding: 10px;
    box-sizing: border-box;
  }

  /* Cards container */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Single card */
  .card {
    width: 100%;
    max-width: 100%;
    padding: 12px;
    font-size: 14px;
  }

  /* Buttons fix */
  .card button {
    margin-top: 8px;
    width: 100%;
  }
  .navbar h2{
    padding-top: 10px;
  }

}

    </style>
</head>

<body>

    <div class="dashboard">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>PlanKaro</h2>
            <li onclick="showSection('dashboard')">📊 Dashboard</li>
            <li onclick="showSection('events')">🎉 Events</li>
            <li onclick="showSection('users')">👥 Users</li>
            <li onclick="showSection('vendors')">🏢 Vendors</li>
            <li onclick="logout()">🚪 Logout</li>
        </div>

        <!-- Main -->
        <div class="main">

            <!-- Navbar -->
            <div class="navbar">
                <h2>Admin Dashboard</h2>
                <!-- <div class="profile">👤 Daksh ▼</div> -->
            </div>

            <!-- Dashboard -->
            <div id="dashboard" class="section" style="display:block;">
                <div class="cards">
                    <div class="card" onclick="showSection('events')">
                        <h3>🎉 Events</h3>
                        <p id="totalEvents">0</p>
                    </div>
                    <div class="card" onclick="showSection('users')" >
                        <h3 >👥 Users</h3>
                        <p id="totalUsers">0</p>
                    </div>
                    <div class="card" onclick="showSection('vendors')">
                        <h3>🏢 Vendors</h3>
                        <p id="totalVendors">0</p>
                    </div>
                </div>
            </div>

            <!-- Events -->
            <div id="events" class="section">
                <h3>Manage Events</h3>
                <input type="text" id="eventName" placeholder="Event Name">
                <button onclick="addEvent()">Add</button>

                <ul id="eventList"></ul>
            </div>

            <!-- Users -->
            <div id="users" class="section">
                <h3>Users</h3>
                <ul id="userList"></ul>
            </div>
            <div id="vendors" class="section">
                <h3>Vendors</h3>
                <ul id="vendorList"></ul>
            </div>

        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
